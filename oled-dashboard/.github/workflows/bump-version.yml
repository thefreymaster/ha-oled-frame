name: Bump version on merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine bump type from PR title
        id: bump
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          TITLE_LOWER=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]')
          if echo "$TITLE_LOWER" | grep -q "major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$TITLE_LOWER" | grep -q "minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in config.yaml
        run: |
          CURRENT=$(grep '^version:' config.yaml | sed 's/version: *"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^version: .*/version: \"${NEW}\"/" config.yaml
          echo "Bumped $CURRENT → $NEW (${{ steps.bump.outputs.type }})"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.yaml
          git commit -m "bump version (${{ steps.bump.outputs.type }})"
          git push
